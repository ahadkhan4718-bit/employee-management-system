<!DOCTYPE html>

<html>

<head>

<title>Edit Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">

Edit Employee

</div>

<div class="card-body">

<form method="POST">

<label>Name</label>

<input
class="form-control"
type="text"
name="name"
value="{{ employee.name }}"
required>

<br>

<label>Salary</label>

<input
class="form-control"
type="number"
name="salary"
value="{{ employee.salary }}"
required>

<br>

<button
class="btn btn-success">

Update Employee

</button>

<a
href="/"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>

</html>
